<script>
    // Konfigurasi Database Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyD1QISBl_kTPkO9DWPHJ5hGSqyT_2cP-8w",
        databaseURL: "https://smartcappacitor-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Listener Real-time Data Sensor 3-Phase (SUDAH DISINKRONKAN)
    database.ref('Sensor').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            // Ambil data berdasarkan struktur object bercabang dari ESP32
            let vR  = (data.Tegangan && data.Tegangan.V1) ? data.Tegangan.V1 : 0;
            let iR  = (data.Arus && data.Arus.I1) ? data.Arus.I1 : 0;
            let pfR = (data.CosPhi && data.CosPhi.PF1) ? data.CosPhi.PF1 : 1;

            let vS  = (data.Tegangan && data.Tegangan.V2) ? data.Tegangan.V2 : 0;
            let iS  = (data.Arus && data.Arus.I2) ? data.Arus.I2 : 0;
            let pfS = (data.CosPhi && data.CosPhi.PF2) ? data.CosPhi.PF2 : 1;

            let vT  = (data.Tegangan && data.Tegangan.V3) ? data.Tegangan.V3 : 0;
            let iT  = (data.Arus && data.Arus.I3) ? data.Arus.I3 : 0;
            let pfT = (data.CosPhi && data.CosPhi.PF3) ? data.CosPhi.PF3 : 1;

            // Update Tampilan per Fasa ke Web Dashboard
            document.getElementById('txt-v-r').innerText  = vR.toFixed(1);
            document.getElementById('txt-i-r').innerText  = iR.toFixed(2);
            document.getElementById('txt-pf-r').innerText = pfR.toFixed(3);
            
            document.getElementById('txt-v-s').innerText  = vS.toFixed(1);
            document.getElementById('txt-i-s').innerText  = iS.toFixed(2);
            document.getElementById('txt-pf-s').innerText = pfS.toFixed(3);
            
            document.getElementById('txt-v-t').innerText  = vT.toFixed(1);
            document.getElementById('txt-i-t').innerText  = iT.toFixed(2);
            document.getElementById('txt-pf-t').innerText = pfT.toFixed(3);
            
            // Perhitungan Nilai Equivalen / Rata-rata
            let vAvgPhase = (vR + vS + vT) / 3;
            let vLineToLine = vAvgPhase * Math.sqrt(3); // Konversi ke Tegangan 380V L-L
            let iAvg = (iR + iS + iT) / 3;
            let pfAvg = (pfR + pfS + pfT) / 3;

            document.getElementById('txt-v-avg').innerText = vLineToLine.toFixed(1);
            document.getElementById('txt-i-avg').innerText = iAvg.toFixed(2);
            document.getElementById('txt-pf-avg').innerText = pfAvg.toFixed(3);

            // Perbarui Log Pesan jika Status Alat sedang ONLINE
            const statusBadge = document.getElementById('system-status');
            if (statusBadge.innerText.includes("ONLINE")) {
                if(pfAvg < 0.90) {
                    document.getElementById('txt-log').innerText = "Sistem Mendeteksi Lagging Beban Induktif. Menyeimbangkan Cap-Bank...";
                } else {
                    document.getElementById('txt-log').innerText = "Faktor Daya Jaringan 3-Phase Stabil & Aman.";
                }
            }
        }
    });

    // Listener Status Step Relay Aktif
    database.ref('Relay/Step_Aktif').on('value', (snapshot) => {
        const stepAktif = snapshot.val() || 0;
        document.getElementById('txt-step-aktif').innerText = "STEP: " + stepAktif + " / 8";

        for (let i = 1; i <= 8; i++) {
            const cardElement = document.getElementById('card-r' + i);
            const stateText = document.getElementById('state-r' + i);
            
            if (i <= stepAktif) {
                cardElement.classList.add('active-on');
                stateText.innerText = "ON";
            } else {
                cardElement.classList.remove('active-on');
                stateText.innerText = "OFF";
            }
        }
    });

    // Listener Deteksi Status Online / Offline Alat
    database.ref('Relay/Status_Alat').on('value', (snapshot) => {
        const status = snapshot.val();
        const statusBadge = document.getElementById('system-status');
        
        if (status === "ONLINE") {
            statusBadge.style.color = "var(--neon-green)";
            statusBadge.style.borderColor = "var(--neon-green)";
            statusBadge.innerText = "● SYSTEM ONLINE";
            
            if (document.getElementById('txt-log').innerText === "Koneksi ke alat terputus! Memeriksa perangkat...") {
                document.getElementById('txt-log').innerText = "Faktor Daya Jaringan 3-Phase Berhasil Sinkron.";
            }
        } else {
            statusBadge.style.color = "var(--hima-red)";
            statusBadge.style.borderColor = "var(--hima-red)";
            statusBadge.innerText = "● SYSTEM OFFLINE";
            document.getElementById('txt-log').innerText = "Koneksi ke alat terputus! Memeriksa perangkat...";
        }
    });
</script>
